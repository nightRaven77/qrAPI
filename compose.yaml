services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: qr_api
    # Exponer API al host en 8090
    ports:
      - "8090:8000"
    environment:
      WEB_CONCURRENCY: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped







